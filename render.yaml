services:
  - type: web
    name: sunmoonlake-grandcircuit
    env: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URI
        sync: false
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        value: https://sunmoonlake-grandcircuit.onrender.com
      - key: NEXT_PUBLIC_SERVER_URL
        value: https://sunmoonlake-grandcircuit.onrender.com
      - key: NODE_VERSION
        value: 18.17.0
